  <script>
  (function () {
    const canvas = document.getElementById('sakura-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const PETAL_COUNT = 28;
    const petals = [];
    const img = new Image();
    img.src = 'assets/petal.webp';

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }
    function createPetal() {
      return {
        x: rand(0, W), y: rand(-160, -20),
        size: rand(18, 40), speedY: rand(0.6, 1.6), speedX: rand(-0.5, 0.5),
        spin: rand(-0.018, 0.018), angle: rand(0, Math.PI * 2),
        opacity: rand(0.35, 0.75), swing: rand(0.3, 0.9),
        swingSpeed: rand(0.008, 0.022), swingPhase: rand(0, Math.PI * 2),
      };
    }
    for (let i = 0; i < PETAL_COUNT; i++) { const p = createPetal(); p.y = rand(0, H); petals.push(p); }
    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H); t += 0.016;
      petals.forEach(p => {
        p.y += p.speedY;
        p.x += p.speedX + Math.sin(t * p.swingSpeed * 60 + p.swingPhase) * p.swing * 0.4;
        p.angle += p.spin;
        if (p.y > H + 60 || p.x < -60 || p.x > W + 60) Object.assign(p, createPetal());
        ctx.save(); ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        if (img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, -p.size / 2, -p.size / 2, p.size, p.size);
        } else {
          ctx.beginPath(); ctx.ellipse(0, 0, p.size * 0.45, p.size * 0.28, 0, 0, Math.PI * 2);
          ctx.fillStyle = '#f08080'; ctx.fill();
        }
        ctx.restore();
      });
      requestAnimationFrame(draw);
    }
    img.onload = draw; img.onerror = draw;
  })();
  </script>

      return new Intl.DateTimeFormat('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' }).format(d);
    }

    function yen(n) { return new Intl.NumberFormat('ja-JP').format(n) + '円'; }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* 桜インジケーター */
    function petalIcon(filled) {
      const fill = filled ? '#f08080' : '#f5d0d0';
      const dot  = filled ? '#fff'    : '#fde8e8';
      return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g transform="translate(12,12)">
          <ellipse rx="3.2" ry="5.5" fill="${fill}" transform="rotate(0) translate(0,-5.5)"/>
          <ellipse rx="3.2" ry="5.5" fill="${fill}" transform="rotate(72) translate(0,-5.5)"/>
          <ellipse rx="3.2" ry="5.5" fill="${fill}" transform="rotate(144) translate(0,-5.5)"/>
          <ellipse rx="3.2" ry="5.5" fill="${fill}" transform="rotate(216) translate(0,-5.5)"/>
          <ellipse rx="3.2" ry="5.5" fill="${fill}" transform="rotate(288) translate(0,-5.5)"/>
          <circle r="2.2" fill="${dot}"/>
        </g>
      </svg>`;
    }

    function petalRow(count) {
      if (count === 0) return '';
      let out = '<span class="inline-flex gap-0.5 items-center" title="重要度 ' + count + '/3">';
      for (let i = 0; i < 3; i++) out += petalIcon(i < count);
      out += '</span>';
      return out;
    }

    /* 重複バッジ */

          return `<span class="inline-flex items-center gap-0.5 text-[9px] font-black text-white px-2 py-0.5 rounded-full ml-auto" style="background:${m.bg}" title="${esc(note)}">${ch}${m.label}と重複</span>`;
        }

    }

      html += '<div class="flex justify-between items-start mb-5">';
      html += `<div><p class="text-xs font-bold text-ink-muted mb-1">${esc(formatDateJa(dateStr))}</p>
        <span class="inline-flex items-center gap-1.5 text-[11px] font-black px-3 py-1 rounded-full" style="background:${m.dotColor};color:#fff;">${m.label} ${petalRow(m.petals)}</span></div>`;
      html += `<button onclick="closePopup()" class="text-ink-muted hover:text-ink transition-colors w-8 h-8 rounded-full hover:bg-sakura-border flex items-center justify-center text-xl leading-none flex-shrink-0 ml-3" aria-label="閉じる">×</button>`;
      html += '</div>';

      tourns.forEach((t, idx) => {
        if (idx > 0) html += '<hr class="border-sakura-border my-5">';
        html += `<h3 class="font-black text-lg text-ink leading-snug mb-4">${esc(t.name)}</h3>`;
        html += '<dl class="grid gap-2.5 text-sm mb-4">';
        html += `<div class="flex gap-3"><dt class="font-semibold text-ink-muted w-10 shrink-0">日時</dt><dd class="text-ink">${esc(formatDateJa(t.date))}</dd></div>`;
        html += `<div class="flex gap-3"><dt class="font-semibold text-ink-muted w-10 shrink-0">場所</dt><dd class="text-ink">${esc(t.venue)}</dd></div>`;
        if (t.grade) html += `<div class="flex gap-3"><dt class="font-semibold text-ink-muted w-10 shrink-0">級</dt><dd><span class="${m.pillCls} text-xs font-bold px-2 py-0.5 rounded-full">${esc(t.grade)}</span></dd></div>`;
        if (t.organizer) html += `<div class="flex gap-3"><dt class="font-semibold text-ink-muted w-10 shrink-0">主催</dt><dd class="text-ink">${esc(t.organizer)}</dd></div>`;
        if (t.supportNote) html += `<div class="flex gap-3"><dt class="font-semibold text-ink-muted w-10 shrink-0">支援</dt><dd class="text-gold font-bold">${esc(t.supportNote)}</dd></div>`;
        html += '</dl>';
        if (t.overlapNote) html += `<div class="text-xs text-amber-900 bg-gold-soft border border-gold-border rounded-lg px-3 py-2 mb-4">${esc(t.overlapNote)}</div>`;
        if (t.docs && t.docs.length) {
          html += '<div class="flex flex-wrap gap-2 pt-2">';
          t.docs.forEach(doc => {
            html += `<a href="${esc(doc.url)}" target="_blank" rel="noopener"
              class="inline-flex items-center gap-1.5 text-xs font-bold text-brand hover:text-brand-dark border border-sakura-border rounded-lg px-3 py-1.5 bg-sakura-bg hover:bg-brand-light transition-colors">
              📎 ${esc(doc.label)}
            </a>`;
          });
          html += '</div>';
        }
      });

      html += '<div class="mt-6 pt-5 border-t border-sakura-border flex justify-center">';
      html += `<button onclick="closePopup()" class="rounded-xl bg-brand text-white font-bold text-sm px-6 py-2 hover:bg-brand-dark transition-colors">閉じる</button>`;
      html += '</div>';
      html += '</div>';

      document.getElementById('popup-card').innerHTML = html;
      document.getElementById('popup-overlay').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    window.closePopup = function () {
      document.getElementById('popup-overlay').style.display = 'none';
      document.body.style.overflow = '';
    };

    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePopup(); });

    /* ================================================================
       カレンダー描画
    ================================================================ */
    function renderCalendar(year, month, tournaments) {
      const daysInMonth = new Date(year, month, 0).getDate();
      const firstDay    = new Date(year, month - 1, 1).getDay();

      /* dayMap[day][type] = [tournament, ...] */
      const dayMap = {};
      tournaments.forEach(t => {
        const d = parseInt(t.date.split('-')[2], 10);
        if (!dayMap[d]) dayMap[d] = {};
        if (!dayMap[d][t.type]) dayMap[d][t.type] = [];
        dayMap[d][t.type].push(t);
      });

      const DN = ['日', '月', '火', '水', '木', '金', '土'];
      let h = '<div class="bg-white rounded-2xl border border-sakura-border p-4 md:p-5 shadow-card">';

      /* 凡例 */
      h += '<div class="flex flex-wrap gap-x-5 gap-y-1 mb-4 text-xs text-ink-muted">';
      [1, 2, 3, 4].forEach(k => {
        const m = TYPE_META[k];
        h += `<span class="inline-flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full" style="background:${m.dotColor}"></span>${m.label}</span>`;
      });
      h += '<span class="ml-auto text-[10px] text-ink-muted/60">● をタップ → 詳細ポップアップ</span>';
      h += '</div>';

      h += '<div class="grid grid-cols-7 gap-0.5 sm:gap-1">';
      DN.forEach((d, i) => {
        const cls = i === 0 ? 'text-rose-400' : i === 6 ? 'text-blue-400' : 'text-ink-muted';
        h += `<div class="text-center text-[10px] font-bold py-1.5 ${cls}">${d}</div>`;
      });

      for (let i = 0; i < firstDay; i++) h += '<div></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const typeMap = dayMap[d] || {};
        const types   = Object.keys(typeMap).map(Number).sort();
        const hasEvt  = types.length > 0;
        const wday    = (firstDay + d - 1) % 7;
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isPast  = dateStr < TODAY;

        const numCls = hasEvt
          ? (isPast ? 'font-black text-ink-muted/60' : 'font-black text-ink')
          : (wday === 0 ? 'text-rose-200' : wday === 6 ? 'text-blue-200' : 'text-ink-muted/30');
        const cellBg = hasEvt ? (isPast ? 'bg-gray-50 border border-gray-200' : 'bg-brand-pale border border-sakura-border') : '';

        h += `<div class="rounded-md sm:rounded-lg p-0.5 sm:p-1 min-h-[40px] sm:min-h-[50px] flex flex-col items-center gap-0.5 ${cellBg}">`;
        h += `<span class="text-[11px] leading-snug ${numCls}">${d}</span>`;
        if (types.length) {
          h += '<div class="flex flex-wrap justify-center gap-0.5">';
          types.forEach(tp => {
            const m     = TYPE_META[tp] || TYPE_META[4];
            const color = isPast ? '#bbb' : m.dotColor;
            h += `<button onclick="showPopup('${dateStr}',${tp})"
              class="w-3 h-3 rounded-full hover:scale-125 transition-transform focus:outline-none focus:ring-2 focus:ring-offset-1"
              style="background:${color};focus-ring-color:${color}"
              title="${esc(m.label)}" aria-label="${esc(m.label)} 詳細を見る"></button>`;
          });
          h += '</div>';
        }
        h += '</div>';
      }

      h += '</div></div>';
      return h;
    }

    /* ================================================================
       月別カード一覧（①〜③は「協会大会」として統合）
    ================================================================ */
    function buildMonthCards(data, monthStr, filterMode) {
      const tourns = (data.tournaments || []).filter(t => t.date.startsWith(monthStr));

      /* 協会大会（①②③）と基金支援（④）に大別 */
      const assoc = [1, 2, 3]
        .flatMap(k => tourns.filter(t => t.type === k))
        .sort((a, b) => a.date.localeCompare(b.date) || a.type - b.type);
      const fund = tourns.filter(t => t.type === 4)
        .sort((a, b) => a.date.localeCompare(b.date));

      const showAssoc = filterMode !== 'fund';

      let h = '<div class="grid gap-10">';

      /* ── 協会大会セクション ── */
      if (showAssoc && assoc.length) {
        h += '<section>';
        h += sectionTitle('🎴', '協会大会', '全日本かるた協会 主催（①）・公認（②）・後援（③）');

        /* 主催（①）は全幅で大きく */
        const type1 = assoc.filter(t => t.type === 1);
        type1.forEach(t => { h += cardType1(t); });

        /* 公認（②）＋後援（③）は2列グリッド */
        const rest = assoc.filter(t => t.type !== 1);
        if (rest.length) {
          if (type1.length) h += '<div class="mt-4"></div>';
          h += '<div class="grid md:grid-cols-2 gap-4">';
          rest.forEach(t => {
            if (t.type === 2) h += cardType2(t);
            else h += cardType3(t);
          });
          h += '</div>';
        }
        h += '</section>';
      }

      /* ── 基金支援セクション ── */
      if (fund.length) {
        h += '<section>';
        h += sectionTitle('💛', 'ちはやふる基金 支援大会・イベント',
          filterMode === 'fund'
            ? '基金支援のみ表示中。①〜③との重複は各カードに表示します。'
            : 'Slack共有ベース。①〜③と重複する場合は重複バッジを表示します。');
        h += '<div class="grid md:grid-cols-2 gap-4">';
        fund.forEach(t => { h += cardType4(t); });
        h += '</div></section>';
      }

      if (!tourns.length || (filterMode === 'fund' && !fund.length)) {
        h += '<p class="text-ink-muted text-sm">該当する大会データがありません。</p>';
      }

      h += '</div>';
      return h;
    }

    /* ================================================================
       月タブ切り替え（グローバル公開）
    ================================================================ */
    window.selectMonth = function (ym) {
      window._currentMonth = ym;
      const data       = window._reportData;
      const filterMode = window._filterMode || 'all';
      const allMonths  = data._allMonths || [];

      /* タブのアクティブ切り替え */
      allMonths.forEach(m => {
        const el = document.getElementById('tab-' + m);
        if (!el) return;
        el.className = (m === ym)
          ? 'shrink-0 px-4 py-2 rounded-xl font-black text-sm bg-brand text-white shadow-sm transition-all'
          : 'shrink-0 px-4 py-2 rounded-xl font-bold text-sm bg-white text-ink-muted border border-sakura-border hover:border-brand/50 transition-all';
        el.setAttribute('aria-selected', String(m === ym));
      });
      /* アクティブタブを中央にスクロール */
      const activeTab = document.getElementById('tab-' + ym);
      if (activeTab) {
        activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      const [yr, mo]   = ym.split('-').map(Number);
      const monthTourns = (data.tournaments || []).filter(t => t.date.startsWith(ym));
      const calTourns   = filterMode === 'fund' ? monthTourns.filter(t => t.type === 4) : monthTourns;

      const calEl   = document.getElementById('cal-container');
      if (calEl) calEl.innerHTML = renderCalendar(yr, mo, calTourns);
      const cardsEl = document.getElementById('cards-container');
      if (cardsEl) cardsEl.innerHTML = buildMonthCards(data, ym, filterMode);
    };

    /* フィルター切り替え（グローバル公開） */
    window.setFilter = function (mode) {
      window._filterMode = mode;
      ['all', 'fund'].forEach(m => {
        const el = document.getElementById('filter-' + m);
        if (!el) return;
        el.className = (m === mode)
          ? 'px-4 py-2 rounded-xl font-black text-sm bg-gold text-white shadow-sm transition-all'
          : 'px-4 py-2 rounded-xl font-bold text-sm bg-white text-gold border border-gold-border hover:border-gold transition-all';
      });
      window.selectMonth(window._currentMonth || (window._reportData._allMonths || [])[0]);
    };

    function sectionTitle(icon, title, sub) {
      return `
      <div class="flex items-end gap-3 mb-5">
        <span class="text-3xl leading-none">${icon}</span>
        <div>
          <h2 class="text-xl font-black text-ink leading-tight">${esc(title)}</h2>
          ${sub ? `<p class="text-xs text-ink-muted mt-0.5">${esc(sub)}</p>` : ''}
        </div>
      </div>`;
    }

    /* ================================================================
       ページ全体を構築
    ================================================================ */
    function buildHtml(data) {
      /* 全月を自動抽出 */
      const allMonths = [...new Set((data.tournaments || []).map(t => t.date.slice(0, 7)))].sort();
      data._allMonths  = allMonths;
      window._reportData = data;
      window._filterMode = 'all';
      window._currentMonth = allMonths[0] || '';

      const reportYear  = allMonths.length ? allMonths[0].split('-')[0] : '2026';
      const heroTitle   = `${reportYear}年 大会・支援スケジュール`;

      /* 4月分の内訳（ヒーロー内サマリー用） */
      const firstMonth  = allMonths[0] || '';
      const firstTourns = (data.tournaments || []).filter(t => t.date.startsWith(firstMonth));
      const byType = { 1:[], 2:[], 3:[], 4:[] };
      firstTourns.forEach(t => { const k = t.type >= 1 && t.type <= 4 ? t.type : 4; byType[k].push(t); });

      let html = '';

      /* ── ヒーローバナー ── */
      html += `
      <div class="relative rounded-2xl sm:rounded-3xl overflow-hidden shadow-hero mb-8 sm:mb-10 mt-1 sm:mt-2">
        <div class="absolute inset-0" style="background:linear-gradient(135deg,#1e3a6e 0%,#2d5299 55%,#c85a5a 100%)"></div>
        <div class="relative px-5 py-7 sm:px-8 sm:py-10 md:px-12 md:py-12">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
            <div class="max-w-lg">
              <p class="text-white/60 text-[10px] font-black tracking-[.3em] uppercase mb-2 sm:mb-3">Monthly Report</p>
              <h1 class="text-2xl sm:text-3xl md:text-4xl font-black text-white leading-tight">${esc(heroTitle)}</h1>
              <p class="mt-2 sm:mt-3 text-white/80 text-xs sm:text-sm leading-relaxed">${esc(data.heroSubtitle || '')}</p>
            </div>
            <div class="hidden sm:flex flex-col items-center gap-3 shrink-0">
              <img src="assets/logo_white.png" alt="ちはやふる基金" class="h-16 sm:h-20 md:h-24 w-auto opacity-95">
            </div>
          </div>
          <div class="mt-4 sm:mt-7 flex flex-wrap gap-2 sm:gap-2.5 items-center border-t border-white/15 pt-4 sm:pt-5">
            <span class="text-[10px] text-white/50 font-bold tracking-widest uppercase mr-1">${firstMonth.split('-')[1]}月の内訳</span>
            ${byType[1].length ? `<span class="inline-flex items-center gap-1 text-xs bg-white/20 text-white rounded-full px-3 py-1.5 font-black">主催 ${byType[1].length}件</span>` : ''}
            ${byType[2].length ? `<span class="inline-flex items-center gap-1 text-xs bg-white/13 text-white rounded-full px-3 py-1.5">公認 ${byType[2].length}件</span>` : ''}
            ${byType[3].length ? `<span class="inline-flex items-center gap-1 text-xs bg-white/8 text-white/85 rounded-full px-3 py-1.5">後援 ${byType[3].length}件</span>` : ''}
            ${byType[4].length ? `<span class="text-xs bg-gold/40 text-white rounded-full px-3 py-1.5">基金支援 ${byType[4].length}件</span>` : ''}
          </div>
        </div>
      </div>`;

      /* ── 凡例 ── */
      html += `
      <div class="mb-6 no-print">
        <div class="flex flex-wrap gap-2 items-center text-xs">
          <span class="inline-flex items-center gap-1.5 rounded-full bg-brand text-white font-bold px-3 py-1.5">① 主催</span>
          <span class="inline-flex items-center gap-1.5 rounded-full bg-rose-300 text-white font-bold px-3 py-1.5">② 公認</span>
          <span class="inline-flex items-center gap-1.5 rounded-full bg-brand-light text-brand-dark font-bold px-3 py-1.5">③ 後援</span>
          <span class="inline-flex items-center gap-1.5 rounded-full bg-gold-soft text-gold border border-gold-border font-bold px-3 py-1.5">④ 基金支援</span>
        </div>
      </div>`;

      /* ── 月タブ（全月・横スクロール） ── */
      const todayYM = TODAY.slice(0, 7);
      html += '<div class="tab-scroll -mx-3 sm:-mx-4 px-3 sm:px-4 mb-4 no-print" role="tablist" aria-label="月選択">';
      html += '<div class="tab-scroll-inner">';
      allMonths.forEach((ym, i) => {
        const [yr, mo0] = ym.split('-');
        const mo    = parseInt(mo0, 10);
        const count = (data.tournaments || []).filter(t => t.date.startsWith(ym)).length;
        const isNow = ym === todayYM;
        const yearLabel = (i === 0 || mo === 1) ? `${yr.slice(2)}/` : '';
        const label = isNow ? `${yearLabel}${mo}月 ✦` : `${yearLabel}${mo}月`;
        const isFirst = i === 0;
        html += `<button id="tab-${ym}" onclick="selectMonth('${ym}')"
          class="shrink-0 ${isFirst ? 'px-4 py-2 rounded-xl font-black text-sm bg-brand text-white shadow-sm' : 'px-4 py-2 rounded-xl font-bold text-sm bg-white text-ink-muted border border-sakura-border hover:border-brand/50'} transition-all whitespace-nowrap"
          role="tab" aria-selected="${String(isFirst)}">
          ${esc(label)}<span class="ml-1 text-[10px] font-normal opacity-60">${count}</span>
        </button>`;
      });
      html += '</div></div>';

      /* ── フィルター ── */
      html += `
      <div class="flex items-center gap-2 mb-5 no-print" role="group" aria-label="絞り込み">
        <span class="text-xs text-ink-muted shrink-0">絞込：</span>
        <button id="filter-all" onclick="setFilter('all')"
          class="shrink-0 px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl font-black text-sm bg-gold text-white shadow-sm transition-all">
          すべて
        </button>
        <button id="filter-fund" onclick="setFilter('fund')"
          class="shrink-0 px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl font-bold text-sm bg-white text-gold border border-gold-border transition-all whitespace-nowrap">
          💛 基金支援のみ
        </button>
      </div>`;

      /* ── カレンダー＆カード（selectMonth() が差し込む） ── */
      html += '<div id="cal-container" class="mb-8"></div>';
      html += '<div id="cards-container" class="mt-4"></div>';

      /* ── KPIセクション ── */
      const k = data.kpi || {};
      const hasKpi = (k.monthlySupporters > 0) || (k.monthlyDonationYen > 0);

      html += `
      <section class="mt-16 break-inside-avoid">
        <div class="flex items-end gap-3 mb-6">
          <span class="text-3xl leading-none">📊</span>
          <div>
            <h2 class="text-xl font-black text-ink">寄付・サポーター状況</h2>
            <p class="text-xs text-ink-muted mt-0.5">毎月の運営報告と連動。前月末時点の確定値。</p>
          </div>
        </div>`;

      if (!hasKpi) {
        html += `
        <div class="rounded-2xl border-2 border-dashed border-sakura-border bg-white p-10 text-center">
          <p class="text-ink-muted text-sm">KPIはまだ入力されていません。<br>Slackの運営報告を受けて <code class="text-xs bg-brand-light px-1 rounded text-brand-dark">kpi</code> を更新してください。</p>
        </div>`;
      } else {
        html += '<div class="grid sm:grid-cols-2 md:grid-cols-3 gap-4 sm:gap-5">';

        /* サポーター数 */
        html += `
        <div class="rounded-2xl bg-white border border-sakura-border shadow-card p-6 relative overflow-hidden">
          <div class="absolute right-2 top-2 opacity-8 pointer-events-none select-none">
            <img src="assets/flower2.webp" alt="" class="w-20 h-auto" loading="lazy">
          </div>
          <p class="text-xs font-bold text-ink-muted uppercase tracking-wider">マンスリーサポーター</p>
          <p class="mt-3 text-5xl font-black text-brand leading-none">${new Intl.NumberFormat('ja-JP').format(k.monthlySupporters || 0)}<span class="text-lg font-bold text-ink-muted ml-1">名</span></p>
        </div>`;

        /* 寄付額 */
        html += `
        <div class="rounded-2xl bg-white border border-sakura-border shadow-card p-6">
          <p class="text-xs font-bold text-ink-muted uppercase tracking-wider">月間寄付総額</p>
          <p class="mt-3 text-3xl font-black text-ink leading-none">${yen(k.monthlyDonationYen || 0)}</p>
          ${k.bankNote ? `<p class="mt-4 text-xs text-ink-muted border-t border-sakura-border pt-3">${esc(k.bankNote)}</p>` : ''}
        </div>`;

        /* 支援実績 */
        html += `
        <div class="rounded-2xl bg-gold-soft border border-gold-border shadow-card p-6">
          <p class="text-xs font-bold text-gold uppercase tracking-wider">今月の大会支援</p>
          ${k.supportSummary ? `<p class="mt-3 text-sm text-ink leading-relaxed">${esc(k.supportSummary)}</p>` : ''}
        </div>`;

        html += '</div>';
      }

      html += '</section>';
      return html;
    }

    /* ── エントリーポイント ── */
    try {
      const data = parseData();
      document.getElementById('app').innerHTML = buildHtml(data);
      const allMonths = data._allMonths || [];
      if (allMonths.length) window.selectMonth(allMonths[0]);
    } catch (e) {
      document.getElementById('app').innerHTML = `
        <div class="rounded-2xl bg-red-50 border border-red-200 p-6">
          <p class="text-red-600 font-bold text-sm">JSONの形式エラー</p>
          <code class="text-xs text-red-500 mt-1 block">${e.message}</code>
        </div>`;
      console.error(e);
    }
  })();
  </script>
</body>
</html>
